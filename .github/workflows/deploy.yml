name: Deploy Angular to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Fix permissions
        run: chmod -R +x node_modules/.bin

      - name: Build Angular
        run: npm run build -- --configuration production --base-href "/AymanKhaled-Web-C46-Saturday-10Am-Online-Angular-01158727223/"

      - name: Copy index.html to 404.html for SPA routing
        run: cp dist/adasa/browser/index.html dist/adasa/browser/404.html

      - name: Add .nojekyll
        run: touch dist/adasa/browser/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/adasa/browser/

  deploy:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy
        uses: actions/deploy-pages@v4
